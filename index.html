<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meeting Room Booking System v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
<style>
:root{
  --bg:#F4F6FB;--surface:#FFFFFF;--surface-2:#F8FAFC;--surface-3:#F1F5F9;
  --text:#1E293B;--text-muted:#64748B;--text-faint:#94A3B8;
  --border:#E7EBF1;--border-strong:#D7DEE8;
  --primary:#2563EB;--primary-600:#1D4ED8;--primary-soft:#EFF4FF;
  --sb-from:#0B1437;--sb-to:#16224F;--sb-text:#9AA6C2;--sb-active:#2563EB;--sb-hover:rgba(255,255,255,.06);
  --green:#10B981;--green-bg:#E9FBF2;--green-tx:#0B8457;
  --red:#EF4444;--red-bg:#FEEDED;--red-tx:#C73A3A;
  --amber:#F59E0B;--amber-bg:#FFF6E6;--amber-tx:#B97309;
  --info:#3B82F6;--info-bg:#EAF2FE;--info-tx:#2563EB;
  --shadow-sm:0 1px 2px rgba(15,23,42,.06);
  --shadow:0 2px 8px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);
  --shadow-lg:0 12px 32px rgba(15,23,42,.14);
  --radius:14px;--radius-sm:10px;
}
[data-theme="dark"]{
  --bg:#0A0F1C;--surface:#141B2C;--surface-2:#1A2336;--surface-3:#212C42;
  --text:#E6ECF7;--text-muted:#9AA7C0;--text-faint:#6B7A99;
  --border:#26324C;--border-strong:#33415F;
  --primary:#3B82F6;--primary-600:#2563EB;--primary-soft:#1A2747;
  --sb-from:#05080F;--sb-to:#0C1428;--sb-text:#8492B0;--sb-active:#3B82F6;--sb-hover:rgba(255,255,255,.05);
  --green:#34D399;--green-bg:#10271F;--green-tx:#5EEAB4;
  --red:#F87171;--red-bg:#2B1717;--red-tx:#FCA5A5;
  --amber:#FBBF24;--amber-bg:#2A2110;--amber-tx:#FCD34D;
  --info:#60A5FA;--info-bg:#16243F;--info-tx:#93C5FD;
  --shadow-sm:0 1px 2px rgba(0,0,0,.4);--shadow:0 2px 10px rgba(0,0,0,.45);--shadow-lg:0 14px 40px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:'Prompt',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;font-size:14px;transition:background .25s,color .25s}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:8px}

.app{display:flex;height:100vh;overflow:hidden;background:var(--bg)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.scroll{flex:1;overflow-y:auto;padding:22px 26px 90px}
@media(max-width:680px){.scroll{padding:16px 14px 92px}}

/* sidebar */
.sidebar{width:236px;flex-shrink:0;background:linear-gradient(170deg,var(--sb-from),var(--sb-to));display:flex;flex-direction:column;color:var(--sb-text);padding:18px 14px;transition:background .25s}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px}
.brand-logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#3B82F6,#1E40AF);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;box-shadow:0 4px 14px rgba(37,99,235,.5)}
.brand-name{color:#fff;font-weight:600;font-size:14px;line-height:1.2;letter-spacing:.3px}
.brand-sub{font-size:10.5px;color:#7E8CB0;letter-spacing:.6px;margin-top:2px}
.nav{display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 13px;border-radius:11px;font-size:13.5px;color:var(--sb-text);transition:.18s}
.nav-item:hover{background:var(--sb-hover);color:#dfe6f5}
.nav-item.active{background:var(--sb-active);color:#fff;font-weight:500;box-shadow:0 6px 18px rgba(37,99,235,.4)}
.nav-item .ic{flex-shrink:0;opacity:.92}.nav-item.active .ic{opacity:1}
.sb-user{display:flex;align-items:center;gap:11px;padding:10px 9px;border-radius:12px;background:rgba(255,255,255,.05);margin-top:8px;cursor:pointer;transition:.18s}
.sb-user:hover{background:rgba(255,255,255,.09)}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#60A5FA,#2563EB);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:14px;flex-shrink:0}
.sb-user-name{color:#fff;font-size:13px;font-weight:500;line-height:1.1}
.sb-user-role{font-size:11px;color:#7E8CB0;margin-top:2px;display:flex;align-items:center;gap:4px}
@media(max-width:880px){.sidebar{display:none}}

/* topbar */
.topbar{display:flex;align-items:center;gap:14px;padding:15px 26px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
@media(max-width:680px){.topbar{padding:13px 14px}}
.topbar h1{font-size:18px;font-weight:600;white-space:nowrap}.topbar h1 .wave{font-weight:400}
.search{flex:1;max-width:430px;display:flex;align-items:center;gap:9px;background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:9px 13px;color:var(--text-muted)}
.search input{flex:1;border:none;background:none;outline:none;color:var(--text);font-size:13px}
.search input::placeholder{color:var(--text-faint)}
.topbar-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.icon-btn{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);background:var(--surface-2);border:1px solid var(--border);transition:.16s;position:relative}
.icon-btn:hover{color:var(--primary);border-color:var(--primary)}.icon-btn:active{transform:scale(.94)}
.badge-dot{position:absolute;top:-3px;right:-3px;min-width:17px;height:17px;border-radius:9px;background:var(--red);color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--surface)}

.section-title{font-size:15.5px;font-weight:600;margin:6px 0 13px;display:flex;align-items:center;gap:8px}
.link{color:var(--primary);font-size:12.5px;font-weight:500;cursor:pointer}.link:hover{text-decoration:underline}
.grid{display:grid;gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
.pad{padding:18px}
.row-between{display:flex;align-items:center;justify-content:space-between}
.muted{color:var(--text-muted)}
.empty{color:var(--text-muted);font-size:13px;padding:22px 4px;text-align:center}

.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:500;white-space:nowrap}
.badge .d{width:6px;height:6px;border-radius:50%}
.b-green{background:var(--green-bg);color:var(--green-tx)}.b-green .d{background:var(--green)}
.b-info{background:var(--info-bg);color:var(--info-tx)}.b-info .d{background:var(--info)}
.b-amber{background:var(--amber-bg);color:var(--amber-tx)}.b-amber .d{background:var(--amber)}
.b-red{background:var(--red-bg);color:var(--red-tx)}.b-red .d{background:var(--red)}
.b-gray{background:var(--surface-3);color:var(--text-muted)}.b-gray .d{background:var(--text-faint)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 17px;border-radius:50px;font-size:13px;font-weight:500;transition:.16s;white-space:nowrap}
.btn:active{transform:scale(.95)}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 14px rgba(37,99,235,.32)}.btn-primary:hover{background:var(--primary-600)}
.btn-ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--primary);color:var(--primary)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{filter:brightness(1.06)}
.btn-sm{padding:7px 13px;font-size:12px}.btn-block{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}

.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px}
.stat{border-radius:13px;padding:15px 16px;position:relative;overflow:hidden}
.stat .lbl{font-size:12px;color:var(--text-muted)}.stat .val{font-size:27px;font-weight:600;line-height:1.1;margin-top:4px}
.stat .unit{font-size:11px;color:var(--text-faint);margin-top:1px}.stat .si{position:absolute;top:13px;right:13px;opacity:.85}
.s-blue{background:var(--info-bg)}.s-blue .val{color:var(--info-tx)}
.s-green{background:var(--green-bg)}.s-green .val{color:var(--green-tx)}
.s-amber{background:var(--amber-bg)}.s-amber .val{color:var(--amber-tx)}
.s-red{background:var(--red-bg)}.s-red .val{color:var(--red-tx)}

.room-gfx{height:118px;border-radius:11px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.room-gfx.sm{height:84px}.room-gfx .gxbadge{position:absolute;top:9px;left:9px;z-index:2}
.room-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px;box-shadow:var(--shadow-sm);transition:.18s}
.room-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.room-card h4{font-size:14.5px;font-weight:600;margin:11px 2px 7px}
.meta-row{display:flex;align-items:center;gap:6px;color:var(--text-muted);font-size:12px;margin:0 2px 9px}
.eq-row{display:flex;flex-wrap:wrap;gap:5px;margin:0 2px 12px}
.eq{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;color:var(--text-muted);background:var(--surface-2);border:1px solid var(--border);padding:3px 7px;border-radius:7px}
/* อุปกรณ์เสริม (extras) */
.extras-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:8px}
.extra-btn{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface-2);color:var(--text-muted);font-size:12.5px;font-weight:500;cursor:pointer;transition:.15s;text-align:left}
.extra-btn:hover{border-color:var(--primary);color:var(--primary)}
.extra-btn.on{border-color:var(--primary);background:var(--primary-soft);color:var(--primary)}
.extra-btn.on .ex-check{opacity:1}
.ex-check{width:16px;height:16px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:auto;opacity:0;transition:.15s}
.eq-extra{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;color:var(--amber-tx);background:var(--amber-bg);border:1px solid var(--amber);padding:3px 7px;border-radius:7px}

.li{display:flex;align-items:center;gap:13px;padding:13px 4px;border-bottom:1px solid var(--border)}
.li:last-child{border-bottom:none}
.li-time{font-size:12.5px;font-weight:600;width:96px;flex-shrink:0;line-height:1.35}
.li-time small{display:block;font-size:10.5px;color:var(--text-faint);font-weight:400}
.li-body{flex:1;min-width:0}.li-title{font-size:13.5px;font-weight:500}.li-sub{font-size:11.5px;color:var(--text-muted);margin-top:2px}

.announce{background:var(--info-bg);border:1px solid var(--border);border-radius:11px;padding:14px}
.announce h5{font-size:13px;font-weight:600;margin-bottom:6px}.announce p{font-size:12px;color:var(--text-muted);line-height:1.6}

/* chat */
.chat-wrap{max-width:660px;margin:0 auto;height:100%;display:flex;flex-direction:column}
.chat-head{display:flex;align-items:center;gap:11px;padding:14px 4px;border-bottom:1px solid var(--border);margin-bottom:6px}
.bot-ava{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#60A5FA,#2563EB);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.chat-body{flex:1;overflow-y:auto;padding:14px 4px;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:10px;max-width:90%}.msg.bot{align-self:flex-start}.msg.me{align-self:flex-end;flex-direction:row-reverse}
.bubble{padding:11px 15px;border-radius:16px;font-size:13.5px;line-height:1.55}
.msg.bot .bubble{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:5px;box-shadow:var(--shadow-sm)}
.msg.me .bubble{background:var(--primary);color:#fff;border-bottom-right-radius:5px;box-shadow:0 4px 14px rgba(37,99,235,.3)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:3px}
.chip{padding:8px 14px;border-radius:50px;border:1.5px solid var(--primary);color:var(--primary);background:var(--surface);font-size:12.5px;font-weight:500;transition:.16s}
.chip:hover{background:var(--primary-soft)}.chip:active{transform:scale(.95)}
.chip.soft{border-color:var(--border-strong);color:var(--text-muted)}
.typing{display:flex;gap:4px;padding:13px 16px}.typing i{width:7px;height:7px;border-radius:50%;background:var(--text-faint);animation:bd 1s infinite}
.typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
@keyframes bd{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
.gap-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;background:var(--green-bg);color:var(--green-tx);border:1px solid var(--green);font-size:12px;font-weight:500;cursor:pointer}
.gap-chip:hover{filter:brightness(1.04)}.gap-chip:active{transform:scale(.96)}
.chat-input{display:flex;align-items:center;gap:9px;padding:10px 11px;background:var(--surface);border:1px solid var(--border);border-radius:50px;margin-top:8px}
.chat-input input{flex:1;border:none;background:none;outline:none;font-size:13px;color:var(--text);padding-left:6px}
.send-btn{width:36px;height:36px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.16s}
.send-btn:active{transform:scale(.9)}.send-btn:disabled{opacity:.5}

/* calendar toolbar */
.cal-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.seg{display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:3px;gap:2px}
.seg button{padding:6px 15px;border-radius:8px;font-size:12.5px;color:var(--text-muted);font-weight:500;transition:.15s}
.seg button.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm)}
.nav-arrow{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-muted)}
.nav-arrow:hover{color:var(--primary);border-color:var(--primary)}

/* timeline (day) */
.timeline{overflow-x:auto}.tl-inner{min-width:1000px}
.tl-head{display:grid;grid-template-columns:150px 1fr;border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:4px}
.tl-hours{display:flex;justify-content:space-between;font-size:10.5px;color:var(--text-faint);padding:0 2px}
.tl-row{display:grid;grid-template-columns:150px 1fr;align-items:center;min-height:60px;border-bottom:1px solid var(--border)}
.tl-room{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:500;padding-right:10px}
.tl-room small{font-size:10.5px;color:var(--text-faint);font-weight:400}
.tl-room-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.tl-track{position:relative;height:44px}
.tl-grid{position:absolute;inset:0;display:flex}.tl-grid span{flex:1;border-left:1px dashed var(--border)}
.tl-block{position:absolute;top:4px;height:36px;border-radius:8px;padding:5px 9px;font-size:10.5px;font-weight:500;color:#fff;overflow:hidden;cursor:pointer;transition:.15s;box-shadow:var(--shadow-sm);z-index:2}
.tl-block:hover{filter:brightness(1.08);transform:translateY(-1px)}.tl-block small{display:block;font-size:9px;opacity:.92;font-weight:400}
.tl-gap{position:absolute;top:6px;height:32px;border-radius:7px;border:1.5px dashed var(--green);background:var(--green-bg);color:var(--green-tx);font-size:10px;font-weight:500;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:.85;z-index:1;transition:.15s}
.tl-gap:hover{opacity:1}
.legend{display:flex;flex-wrap:wrap;gap:16px;margin-top:16px;font-size:11.5px;color:var(--text-muted)}
.legend span{display:inline-flex;align-items:center;gap:6px}.legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
.legend i.dash{background:var(--green-bg);border:1.5px dashed var(--green)}

/* sheet (month x time per room) */
.room-pills{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px}
.room-pill{display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:50px;border:1px solid var(--border);background:var(--surface-2);font-size:12.5px;font-weight:500;white-space:nowrap;color:var(--text-muted);transition:.15s}
.room-pill .dotc{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.room-pill.on{border-color:var(--primary);color:var(--text);background:var(--primary-soft)}
.room-pill:active{transform:scale(.96)}
.sheet{overflow-x:auto}.sheet-inner{min-width:920px}
.sheet-head{display:grid;grid-template-columns:104px 1fr;border-bottom:1.5px solid var(--border-strong);position:sticky;top:0;background:var(--surface);z-index:3}
.sheet-hours span{text-align:center;font-size:10.5px;color:var(--text-muted);padding:9px 2px;border-left:1px solid var(--border)}
.sheet-weekhdr{font-size:11px;color:var(--text-faint);font-weight:500;padding:9px 6px 3px}
.sheet-row{display:grid;grid-template-columns:104px 1fr;min-height:44px;border-bottom:1px solid var(--border)}
.sheet-row.holi{background:repeating-linear-gradient(45deg,transparent,transparent 7px,var(--surface-3) 7px,var(--surface-3) 14px)}
.sheet-day{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:0 9px;border-right:1px solid var(--border)}
.sheet-day small{color:var(--text-faint);font-weight:400}.sheet-day.today{color:var(--primary)}
.sheet-track{position:relative}
.sheet-grid{position:absolute;inset:0;display:grid}.sheet-grid span{border-left:1px solid var(--border)}
.sheet-empty{position:absolute;inset:0;z-index:1;cursor:pointer}
.sheet-block{position:absolute;top:6px;height:32px;border-radius:6px;padding:4px 8px;font-size:10px;font-weight:500;color:#fff;overflow:hidden;cursor:pointer;white-space:nowrap;box-shadow:var(--shadow-sm);z-index:2;line-height:1.25}
.sheet-block:hover{filter:brightness(1.08);z-index:4}.sheet-block small{font-size:8.5px;opacity:.9}

/* week */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
@media(max-width:880px){.week-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:560px){.week-grid{grid-template-columns:repeat(2,1fr)}}
.wcol{background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:9px;min-height:120px}
.wcol.today{border-color:var(--primary);box-shadow:0 0 0 1px var(--primary)}
.wc-head{text-align:center;font-size:11px;color:var(--text-muted);padding-bottom:7px;border-bottom:1px solid var(--border);margin-bottom:7px}
.wc-head b{display:block;font-size:17px;color:var(--text);font-weight:600}
.wc-item{font-size:10.5px;padding:5px 7px;border-radius:7px;color:#fff;margin-bottom:5px;cursor:pointer;line-height:1.3}
.wc-item small{display:block;opacity:.9;font-size:9px}
.wc-empty{font-size:10px;color:var(--text-faint);text-align:center;padding:8px 0}

/* month */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.mh{text-align:center;font-size:11px;color:var(--text-muted);font-weight:500;padding:4px 0}
.mcell{min-height:78px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:6px 7px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;gap:3px}
.mcell:hover{border-color:var(--primary)}.mcell.muted-cell{opacity:.4}
.mcell.today{border-color:var(--primary);background:var(--primary-soft)}
.mc-date{font-size:12.5px;font-weight:600}
.mc-dots{display:flex;flex-wrap:wrap;gap:3px;margin-top:auto}
.mc-dot{width:7px;height:7px;border-radius:50%}
.mc-count{font-size:9.5px;color:var(--text-muted);margin-top:2px}

/* ====== HELPERS ====== */
const t2m=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
const m2t=m=>String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');
const overlap=(s1,e1,s2,e2)=>t2m(s1)<t2m(e2)&&t2m(s2)<t2m(e1);
const durText=(s,e)=>{let d=t2m(e)-t2m(s);if(d<=0)return'—';const h=Math.floor(d/60),m=d%60;return(h?h+' ชม. ':'')+(m?m+' นาที':(h?'':'0 นาที'));};
const roomFree=(roomId,date,s,e,bookings,ignoreId)=>!bookings.some(b=>b.id!==ignoreId&&b.room===roomId&&b.date===date&&ACTIVE.includes(b.status)&&overlap(s,e,b.s,b.e));
function freeGaps(roomId,date,bookings){
  const busy=bookings.filter(b=>b.room===roomId&&b.date===date&&ACTIVE.includes(b.status)).map(b=>[t2m(b.s),t2m(b.e)]).sort((a,b)=>a[0]-b[0]);
  const gaps=[];let cur=DAY_START;
  for(const[s,e]of busy){if(s>cur)gaps.push([cur,s]);cur=Math.max(cur,e);}
  if(cur<DAY_END)gaps.push([cur,DAY_END]);
  return gaps.map(([s,e])=>({s:m2t(s),e:m2t(e)}));
}
const TH_MONTHS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const TH_MONTHS_F=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const TH_DOW=['อา','จ','อ','พ','พฤ','ศ','ส'];
const parseISO=iso=>{const[y,m,d]=iso.split('-').map(Number);return new Date(y,m-1,d);};
const toISO=dt=>dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
const thFull=iso=>{const d=parseISO(iso);return d.getDate()+' '+TH_MONTHS_F[d.getMonth()]+' '+(d.getFullYear()+543);};
const thShort=iso=>{const d=parseISO(iso);return d.getDate()+' '+TH_MONTHS[d.getMonth()]+' '+(d.getFullYear()+543);};
const addDays=(iso,n)=>{const d=parseISO(iso);d.setDate(d.getDate()+n);return toISO(d);};
const startOfWeek=iso=>addDays(iso,-parseISO(iso).getDay());

/* ====== BOOKING FORM ====== */
function BookingForm({bookings,addBooking,toast,user,go,prefill,clearPrefill}){
  const [roomId,setRoomId]=useState(prefill.roomId||'A');
  const [date,setDate]=useState(prefill.date||TODAY);
  const [s,setS]=useState(prefill.s||'09:00');
  const [e,setE]=useState(prefill.e||'10:00');
  const [title,setTitle]=useState('');
  const [att,setAtt]=useState('');
  const [link,setLink]=useState('');
  const [extras,setExtras]=useState([]);
  const toggleExtra=id=>setExtras(ex=>ex.includes(id)?ex.filter(x=>x!==id):[...ex,id]);
  useEffect(()=>()=>clearPrefill(),[]);
  const gaps=useMemo(()=>freeGaps(roomId,date,bookings),[roomId,date,bookings]);
  const valid=t2m(e)>t2m(s);
  const conflict=valid&&!roomFree(roomId,date,s,e,bookings);
  const submit=(status)=>{
    if(!valid){toast('เวลาสิ้นสุดต้องมากกว่าเวลาเริ่ม','err');return;}
    if(status!=='draft'&&conflict){toast('ช่วงเวลานี้ชนกับการจองอื่น','err');return;}
    addBooking({room:roomId,date,s,e,title:title||'การประชุมใหม่',att:Number(att)||ROOM(roomId).cap,owner:user.id,by:user.name,link,extras,status,checkedIn:false}, status==='draft'?'mine':'calendar');
  };
  return(
    <div className="form-wrap">
      <div className="card pad">
        <div className="form-grid">
          <div className="field">
            <label>ชื่อห้องประชุม<span className="req">*</span></label>

/* ====== CALENDAR ====== */
function CalendarView({bookings,openDetail,openForm,cursor,setCursor}){
  const [view,setView]=useState('sheet');
  const [sheetRoom,setSheetRoom]=useState('A');
  const H_START=8,H_END=20,SPAN=(H_END-H_START)*60;
  const hours=[];for(let h=H_START;h<=H_END;h++)hours.push(h);
  const pos=(s,e)=>({left:(t2m(s)-H_START*60)/SPAN*100+'%',width:(t2m(e)-t2m(s))/SPAN*100+'%'});
  // sheet: 09:00-18:00
  const SH=9*60,SHE=18*60,SHS=SHE-SH,shCols=[9,10,11,12,13,14,15,16,17];
  const spos=(s,e)=>{const a=Math.max(t2m(s),SH),b=Math.min(t2m(e),SHE);if(b<=a)return null;return{left:(a-SH)/SHS*100+'%',width:(b-a)/SHS*100+'%'};};
  const HOLIDAYS=['2026-06-03']; // วันเฉลิมฯ (ตัวอย่างวันหยุด)
  const weekRows=useMemo(()=>{
    const d=parseISO(cursor),y=d.getFullYear(),m=d.getMonth(),dim=new Date(y,m+1,0).getDate();
    const weeks=[];let cur=[];
    for(let day=1;day<=dim;day++){const dt=new Date(y,m,day),dow=dt.getDay();if(dow===0||dow===6)continue;if(dow===1&&cur.length){weeks.push(cur);cur=[];}cur.push(toISO(dt));}
    if(cur.length)weeks.push(cur);return weeks;
  },[cursor]);
  const isMonthly=view==='month'||view==='sheet';
  const label=isMonthly?TH_MONTHS_F[parseISO(cursor).getMonth()]+' '+(parseISO(cursor).getFullYear()+543):view==='week'?'สัปดาห์ '+thShort(startOfWeek(cursor)):thFull(cursor);
  const move=n=>{if(isMonthly){const d=parseISO(cursor);d.setMonth(d.getMonth()+n);d.setDate(1);setCursor(toISO(d));}else if(view==='week')setCursor(addDays(cursor,7*n));else setCursor(addDays(cursor,n));};
  return(
    <div className="card pad">
      <div className="cal-toolbar">
        <button className="nav-arrow" onClick={()=>move(-1)}><Icon name="cleft" size={16}/></button>
        <button className="nav-arrow" onClick={()=>move(1)}><Icon name="cright" size={16}/></button>
        <button className="btn btn-ghost btn-sm" onClick={()=>setCursor(TODAY)}>วันนี้</button>
        <div style={{fontWeight:600,fontSize:15,marginLeft:4}}>{label}</div>
        <div className="seg" style={{marginLeft:'auto'}}>{[['sheet','ตารางห้อง'],['day','วัน'],['week','สัปดาห์'],['month','เดือน']].map(([v,l])=><button key={v} className={view===v?'on':''} onClick={()=>setView(v)}>{l}</button>)}</div>
      </div>

      {view==='sheet'&&<>
        <div className="room-pills">
          {ROOMS.map(r=><button key={r.id} className={"room-pill"+(sheetRoom===r.id?' on':'')} onClick={()=>setSheetRoom(r.id)}><span className="dotc" style={{background:r.g[0]}}></span>{r.name}</button>)}
        </div>
        <div className="sheet"><div className="sheet-inner">
          <div className="sheet-head">
            <div style={{fontSize:11.5,fontWeight:600,color:'var(--text-muted)',display:'flex',alignItems:'center',padding:'0 9px'}}>วันที่ / เวลา</div>
            <div className="sheet-hours" style={{display:'grid',gridTemplateColumns:`repeat(${shCols.length},1fr)`}}>{shCols.map(h=><span key={h}>{String(h).padStart(2,'0')}:00</span>)}</div>
          </div>
          {weekRows.map((wk,wi)=>(
            <div key={wi}>
              <div className="sheet-weekhdr">สัปดาห์ที่ {wi+1}</div>
              {wk.map(d=>{
                const dt=parseISO(d),hol=HOLIDAYS.includes(d);
                const list=bookings.filter(b=>b.room===sheetRoom&&b.date===d&&!['draft','cancelled'].includes(b.status));
                return(<div className={"sheet-row"+(hol?' holi':'')} key={d}>
                  <div className={"sheet-day"+(d===TODAY?' today':'')}>{TH_DOW[dt.getDay()]}<small>{dt.getDate()}/{dt.getMonth()+1}</small></div>
                  <div className="sheet-track">
                    <div className="sheet-grid" style={{gridTemplateColumns:`repeat(${shCols.length},1fr)`}}>{shCols.map(h=><span key={h}></span>)}</div>
                    {!hol&&<div className="sheet-empty" onClick={()=>openForm({roomId:sheetRoom,date:d})} title="กดเพื่อจองวันนี้"></div>}
                    {!hol&&list.map(b=>{const p=spos(b.s,b.e);if(!p)return null;return<div key={b.id} className="sheet-block" style={{...p,background:STATUS[b.status].bar}} onClick={ev=>{ev.stopPropagation();openDetail(b);}} title={b.title+' · '+b.by}>{b.title}<small> {b.s}-{b.e}</small></div>;})}
                    {hol&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10.5,color:'var(--text-faint)',fontWeight:500}}>วันหยุด</div>}
                  </div>
                </div>);
              })}
            </div>
          ))}
        </div></div>
        <div className="legend">
          {Object.entries(STATUS).filter(([k])=>!['released','draft'].includes(k)).map(([k,v])=><span key={k}><i style={{background:v.bar}}></i>{v.label}</span>)}
          <span style={{color:'var(--text-faint)'}}>กดช่องว่าง = จอง · กดบล็อก = ดูรายละเอียด</span>
        </div>
      </>}

      {view==='day'&&<>
        <div className="timeline"><div className="tl-inner">
          <div className="tl-head"><div style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',alignSelf:'center'}}>ห้องประชุม</div><div className="tl-hours">{hours.map(h=><span key={h}>{String(h).padStart(2,'0')}</span>)}</div></div>
          {ROOMS.map(r=>{
            const list=bookings.filter(b=>b.room===r.id&&b.date===cursor&&b.status!=='draft');
            const gaps=freeGaps(r.id,cursor,bookings);
            return(
              <div className="tl-row" key={r.id}>
                <div className="tl-room"><div className="tl-room-ic" style={{background:`linear-gradient(135deg,${r.g[0]},${r.g[1]})`}}><Icon name="room" size={15}/></div><div>{r.name}<small>{r.cap} ที่นั่ง</small></div></div>
                <div className="tl-track">
                  <div className="tl-grid">{hours.slice(1).map((h,i)=><span key={i}></span>)}</div>
                  {gaps.map((g,i)=><div key={'g'+i} className="tl-gap" style={pos(g.s,g.e)} onClick={()=>openForm({roomId:r.id,date:cursor,s:g.s,e:g.e})} title="กดเพื่อจองช่วงนี้">+ ว่าง</div>)}
                  {list.map(b=><div key={b.id} className="tl-block" style={{...pos(b.s,b.e),background:STATUS[b.status].bar,opacity:b.status==='cancelled'?.5:1}} onClick={()=>openDetail(b)}>{b.title}<small>{b.s} · {b.by}</small></div>)}
                </div>
              </div>
            );
          })}
        </div></div>
        <div className="legend">
          {Object.entries(STATUS).filter(([k])=>!['released','draft'].includes(k)).map(([k,v])=><span key={k}><i style={{background:v.bar}}></i>{v.label}</span>)}
          <span><i className="dash"></i>ช่วงว่าง (กดเพื่อจอง)</span>
        </div>
      </>}

      {view==='week'&&(()=>{
        const wk=startOfWeek(cursor);const days=[...Array(7)].map((_,i)=>addDays(wk,i));
        return<div className="week-grid">{days.map(d=>{
          const list=bookings.filter(b=>b.date===d&&b.status!=='draft'&&b.status!=='cancelled').sort((a,b)=>t2m(a.s)-t2m(b.s));
          const dt=parseISO(d);
          return(<div key={d} className={"wcol"+(d===TODAY?' today':'')}>
            <div className="wc-head">{TH_DOW[dt.getDay()]}<b>{dt.getDate()}</b></div>
            {list.length?list.map(b=><div key={b.id} className="wc-item" style={{background:STATUS[b.status].bar}} onClick={()=>openDetail(b)}>{ROOM(b.room).name}<small>{b.s}-{b.e}</small></div>):<div className="wc-empty">ว่าง</div>}
          </div>);
        })}</div>;
      })()}

      {view==='month'&&(()=>{
        const first=parseISO(cursor);first.setDate(1);const startISO=startOfWeek(toISO(first));
        const cells=[...Array(42)].map((_,i)=>addDays(startISO,i));const mon=parseISO(cursor).getMonth();
        return<div>
          <div className="month-grid" style={{marginBottom:6}}>{TH_DOW.map(d=><div key={d} className="mh">{d}</div>)}</div>
          <div className="month-grid">{cells.map(d=>{
            const dt=parseISO(d);const inMon=dt.getMonth()===mon;
            const list=bookings.filter(b=>b.date===d&&ACTIVE.includes(b.status));
            return(<div key={d} className={"mcell"+(!inMon?' muted-cell':'')+(d===TODAY?' today':'')} onClick={()=>{setCursor(d);setView('sheet');}}>
              <div className="mc-date">{dt.getDate()}</div>
              <div className="mc-dots">{list.slice(0,4).map(b=><span key={b.id} className="mc-dot" style={{background:STATUS[b.status].bar}}></span>)}</div>
              {list.length>0&&<div className="mc-count">{list.length} รายการ</div>}
            </div>);
          })}</div>
          <div style={{fontSize:11.5,color:'var(--text-muted)',marginTop:10,textAlign:'center'}}>กดที่วันเพื่อดูตารางห้อง</div>
        </div>;
      })()}
    </div>
  );
}

function MyBookings({bookings,openDetail,checkIn,user}){
  const [filter,setFilter]=useState('all');

  const F={all:'ทั้งหมด',upcoming:'กำลังจะมาถึง',inuse:'กำลังใช้งาน',draft:'ร่าง',cancelled:'ยกเลิก'};
  const show=mine.filter(b=>filter==='all'?true:filter==='upcoming'?['confirmed','pending'].includes(b.status):filter==='inuse'?b.status==='in-use':filter==='draft'?b.status==='draft':['cancelled','released'].includes(b.status));
  return(
    <div>
      <div className="tabs">{Object.entries(F).map(([k,l])=><button key={k} className={"tab"+(filter===k?' on':'')} onClick={()=>setFilter(k)}>{l}</button>)}</div>
      <div className="card pad">
        {show.length?show.sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:t2m(a.s)-t2m(b.s)).map(b=>{
          const r=ROOM(b.room),canCheck=b.status==='in-use'&&!b.checkedIn;
          return(<div className="li" key={b.id}>
            <div className="li-time">{b.s} - {b.e}<small>{thShort(b.date)}</small></div>
            <div style={{width:38,height:38,borderRadius:9,background:`linear-gradient(135deg,${r.g[0]},${r.g[1]})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',flexShrink:0}}><Icon name="room" size={17}/></div>
            <div className="li-body" onClick={()=>openDetail(b)} style={{cursor:'pointer'}}><div className="li-title">{r.name} · {b.title}</div><div className="li-sub">{b.att} คน{b.link?' · มีลิงก์ Zoom':''}{b.extras&&b.extras.length?' · ⚡ ขอ IT '+b.extras.length+' รายการ':''}</div></div>

          </div>);
        }):<div className="empty">ไม่มีรายการในหมวดนี้</div>}

    </div>
  );
}

/* ====== CHARTS ====== */
function Donut({data,size=170}){
  const total=data.reduce((s,d)=>s+d.value,0),r=size/2-18,C=2*Math.PI*r;let acc=0;
  return(<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--surface-3)" strokeWidth="20"/>
    {data.map((d,i)=>{const f=d.value/total,dash=f*C,off=acc*C;acc+=f;return<circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={d.color} strokeWidth="20" strokeDasharray={`${dash} ${C-dash}`} strokeDashoffset={-off} transform={`rotate(-90 ${size/2} ${size/2})`}/>;})}
    <text x="50%" y="47%" textAnchor="middle" fontSize="22" fontWeight="600" fill="var(--text)" fontFamily="Prompt">{total}</text>
    <text x="50%" y="60%" textAnchor="middle" fontSize="11" fill="var(--text-muted)" fontFamily="Prompt">ครั้ง/เดือน</text>
  </svg>);
}
function Bars({data,height=170}){
  const max=Math.max(...data.map(d=>d.value)),W=320,pad=24,bw=26,step=(W-pad*2)/data.length;
  return(<svg width="100%" viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="xMidYMid meet">
    {[0,.5,1].map((g,i)=>{const y=pad+(height-pad*2)*(1-g);return<line key={i} x1={pad} y1={y} x2={W-pad} y2={y} stroke="var(--border)" strokeDasharray="3 3"/>;})}
    {data.map((d,i)=>{const h=(d.value/max)*(height-pad*2),x=pad+step*i+(step-bw)/2,y=height-pad-h;return<g key={i}><rect x={x} y={y} width={bw} height={h} rx="5" fill="var(--primary)"/><text x={x+bw/2} y={height-pad+13} textAnchor="middle" fontSize="10" fill="var(--text-muted)" fontFamily="Prompt">{d.label}</text></g>;})}
  </svg>);
}

/* ============================================================
   API LAYER — เชื่อม Google Apps Script ผ่าน JSONP (เลี่ยง CORS)
   - onload detection: กัน infinite spinner (callback ไม่ยิงใน 1.5s = response ผิดรูปแบบ)
   - retry อัตโนมัติ 1 ครั้ง เฉพาะ network/timeout (ไม่ retry business error เช่นชนเวลา)
   ============================================================ */
let _jsonpId=0;
function jsonp(params){
  return new Promise((resolve,reject)=>{
    if(!API_URL || API_URL.indexOf('PASTE_YOUR')===0){
      reject(new Error('ยังไม่ได้ตั้งค่า API_URL — เปิดไฟล์ HTML แล้ววาง Web App URL ในตัวแปร API_URL ด้านบนสุด'));
      return;
    }
    const cb='mrcb_'+(++_jsonpId)+'_'+Date.now();
    const s=document.createElement('script');
    let done=false;
    const finish=(fn,arg)=>{ if(done)return; done=true; cleanup(); fn(arg); };
    const cleanup=()=>{ clearTimeout(timer); try{delete window[cb];}catch(e){window[cb]=undefined;} if(s&&s.parentNode)s.parentNode.removeChild(s); };
    const timer=setTimeout(()=>finish(reject,new Error('หมดเวลาเชื่อมต่อ (timeout) — ลองใหม่อีกครั้ง')),15000);
    window[cb]=(resp)=>finish(resolve,resp);
    s.onerror=()=>finish(reject,new Error('เชื่อมต่อเซิร์ฟเวอร์ไม่สำเร็จ (เช็ค URL / สิทธิ์ Deploy = Anyone)'));
    // script โหลดเสร็จแต่ callback ไม่ทำงานใน 1.5s = response ไม่ใช่ JSONP → reject ทันที (กันค้าง)
    s.onload=()=>{ setTimeout(()=>finish(reject,new Error('เซิร์ฟเวอร์ตอบผิดรูปแบบ — เช็ค Deploy เป็น Web App + Who has access: Anyone')),1500); };
    const qs=Object.keys(params).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&');
    s.src=API_URL+'?'+qs+'&callback='+cb;
    document.body.appendChild(s);
  });
}
async function apiGetAll(){ const r=await jsonp({action:'getAll'}); if(!r.ok)throw new Error(r.error||'โหลดข้อมูลไม่สำเร็จ'); return r.data; }
async function apiLogin(userId,password){ const r=await jsonp({action:'login',userId:userId,password:password}); if(!r.ok)throw new Error(r.error||'เข้าสู่ระบบไม่สำเร็จ'); return r.data.user; }
async function apiRegister(user){ const r=await jsonp({payload:JSON.stringify({action:'register',user:user})}); if(!r.ok)throw new Error(r.error||'สมัครสมาชิกไม่สำเร็จ'); return r.data.user; }
/* WRITE — ส่ง payload ผ่าน GET (JSONP) + retry 1 ครั้งเฉพาะ network/timeout */
async function apiWrite(payload){
  const body=JSON.stringify(payload), act=payload.action||'?', t0=Date.now();
  console.log('%c[MRB] ⬆ '+act,'color:#3b82f6', new Date().toLocaleTimeString());
  let r;
  try{ r=await jsonp({payload:body}); }
  catch(netErr){
    console.warn('%c[MRB] ⚠ retry '+act,'color:#f59e0b','—',netErr.message);
    await new Promise(res=>setTimeout(res,600));
    r=await jsonp({payload:body});   // ถ้าพังอีกรอบ ปล่อย error เด้งออกไป
  }
  if(!r.ok){ console.error('%c[MRB] ✗ '+act,'color:#dc2626','—',r.error); throw new Error(r.error||'บันทึกไม่สำเร็จ'); }
  console.log('%c[MRB] ✓ '+act,'color:#16a34a', ((Date.now()-t0)/1000).toFixed(2)+'s');
  return r.data;
}

function AuthScreen({onLogin}){
  const [mode,setMode]=useState('login');
  const [userId,setUserId]=useState('');
  const [pwd,setPwd]=useState('');
  const [name,setName]=useState('');
  const [dept,setDept]=useState('');
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');

  const doLogin=async()=>{
    if(!userId||!pwd){setErr('กรอก User ID และรหัสผ่าน');return;}
    setBusy(true);setErr('');
    try{ const u=await apiLogin(userId.trim(),pwd); onLogin(u); }
    catch(e){ setErr(e.message); setBusy(false); }
  };
  const doRegister=async()=>{
    if(!userId||!pwd||!name){setErr('กรอก User ID, รหัสผ่าน และชื่อที่แสดง');return;}
    setBusy(true);setErr('');
    try{ const u=await apiRegister({userId:userId.trim(),password:pwd,displayName:name.trim(),dept:dept.trim(),role:'member'}); onLogin(u); }
    catch(e){ setErr(e.message); setBusy(false); }
  };
  const submit=mode==='login'?doLogin:doRegister;
  const onEnter=e=>{ if(e.key==='Enter')submit(); };

  return(<div className="auth-wrap"><div className="auth-card">
    <div className="auth-logo"><Icon name="calendar" size={26}/></div>
    <div className="auth-title">{mode==='login'?'เข้าสู่ระบบ':'สมัครสมาชิก'}</div>
    <div className="auth-sub">ระบบจองห้องประชุม · Meeting Room Booking</div>
    {err&&<div className="auth-err"><Icon name="warn" size={15}/><span>{err}</span></div>}
    {mode==='register'&&<div className="auth-field"><label>ชื่อที่แสดง<span className="req">*</span></label><input className="auth-input" placeholder="เช่น เต้ วราการ" value={name} onChange={e=>setName(e.target.value)} onKeyDown={onEnter}/></div>}
    <div className="auth-field"><label>User ID<span className="req">*</span></label><input className="auth-input" placeholder="ชื่อผู้ใช้สำหรับล็อกอิน" value={userId} onChange={e=>setUserId(e.target.value)} onKeyDown={onEnter} autoComplete="username"/></div>
    <div className="auth-field"><label>รหัสผ่าน<span className="req">*</span></label><input className="auth-input" type="password" placeholder="••••••" value={pwd} onChange={e=>setPwd(e.target.value)} onKeyDown={onEnter} autoComplete={mode==='login'?'current-password':'new-password'}/></div>
    {mode==='register'&&<div className="auth-field"><label>แผนก</label><input className="auth-input" placeholder="เช่น IT Department (ไม่บังคับ)" value={dept} onChange={e=>setDept(e.target.value)} onKeyDown={onEnter}/></div>}
    <button className="auth-btn" disabled={busy} onClick={submit}>{busy?'กำลังดำเนินการ...':(mode==='login'?'เข้าสู่ระบบ':'สมัครสมาชิก')}</button>
    <div className="auth-switch">{mode==='login'?<>ยังไม่มีบัญชี? <b onClick={()=>{setMode('register');setErr('');}}>สมัครสมาชิก</b></>:<>มีบัญชีแล้ว? <b onClick={()=>{setMode('login');setErr('');}}>เข้าสู่ระบบ</b></>}</div>
    {mode==='login'&&<div className="auth-hint">🔑 ทดลองใช้: <b>u1</b> / <b>1234</b> (แอดมิน) หรือ <b>demo</b> / <b>1234</b></div>}
  </div></div>);
}

/* ====== ROOMS ADMIN (admin/IT เท่านั้น) ====== */
const ROOM_COLORS=[
  ['#3B82F6','#1D4ED8'],['#0EA5A5','#0F766E'],['#8B5CF6','#6D28D9'],
  ['#334155','#0F172A'],['#F59E0B','#D97706'],['#EC4899','#BE185D'],
  ['#10B981','#059669'],['#EF4444','#DC2626'],['#F97316','#EA580C'],
];

function RoomFormModal({room,onSave,onClose,saving}){
  const isEdit=!!room.id;
  const [name,setName]=useState(room.name||'');
  const [cap,setCap]=useState(room.cap||10);
  const [eq,setEq]=useState(room.eq||[]);
  const [customEq,setCustomEq]=useState(''); // free-text เพิ่มอุปกรณ์เอง
  const [gIdx,setGIdx]=useState(()=>{
    const i=ROOM_COLORS.findIndex(c=>c[0]===(room.g&&room.g[0]));
    return i>=0?i:0;
  });
  const togglePreset=id=>setEq(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  const addCustom=()=>{
    const val=customEq.trim();
    if(!val||eq.includes(val))return;
    setEq(prev=>[...prev,val]);
    setCustomEq('');
  };
  const removeEq=id=>setEq(prev=>prev.filter(x=>x!==id));
  const handleSave=()=>{
    if(!name.trim())return;
    onSave({id:room.id||undefined,name:name.trim(),capacity:Number(cap)||0,equipment:eq,colorFrom:ROOM_COLORS[gIdx][0],colorTo:ROOM_COLORS[gIdx][1]});
  };
  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:500}} onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <Icon name={isEdit?'edit':'plus'} size={18}/>
          {isEdit?'แก้ไขห้องประชุม':'เพิ่มห้องประชุมใหม่'}
          <button className="modal-x" style={{position:'static',marginLeft:'auto',background:'var(--surface-2)',color:'var(--text-muted)'}} onClick={onClose}><Icon name="x" size={17}/></button>
        </div>
        <div style={{padding:'16px 20px 22px',maxHeight:'75vh',overflowY:'auto'}}>
          <div className="room-form-grid">
            {/* Preview */}
            <div style={{height:76,borderRadius:12,background:`linear-gradient(135deg,${ROOM_COLORS[gIdx][0]},${ROOM_COLORS[gIdx][1]})`,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <span style={{color:'#fff',fontWeight:600,fontSize:16,textShadow:'0 1px 4px rgba(0,0,0,.4)'}}>{name||'ชื่อห้อง'}</span>
            </div>
            <div className="field">
              <label>ชื่อห้องประชุม<span className="req">*</span></label>
              <input className="inp" placeholder="เช่น Board Room, PREMA F4" value={name} onChange={e=>setName(e.target.value)}/>
            </div>
            <div className="field">
              <label>จำนวนที่นั่ง (คน)<span className="req">*</span></label>
              <input className="inp" type="number" min="1" max="500" value={cap} onChange={e=>setCap(e.target.value)}/>
            </div>
            {/* อุปกรณ์ในห้อง — preset + free-text */}
            <div className="field">
              <label>อุปกรณ์ในห้อง (ติดถาวร)</label>
              <div style={{fontSize:11.5,color:'var(--text-muted)',marginBottom:8}}>เลือก preset หรือพิมพ์เพิ่มเองได้อิสระ</div>
              {/* Preset */}
              <div className="eq-check-row" style={{marginBottom:10}}>
                {EQ_PRESETS.map(o=>(
                  <button key={o.id} type="button" className={'eq-check'+(eq.includes(o.id)?' on':'')}
                    onClick={()=>togglePreset(o.id)}>
                    <Icon name={o.icon} size={14}/>{o.label}
                  </button>
                ))}
              </div>
              {/* Free-text input */}
              <div style={{display:'flex',gap:8,marginBottom:8}}>
                <input className="inp" style={{flex:1}} placeholder="พิมพ์อุปกรณ์เพิ่ม เช่น จอ LED 85 นิ้ว" value={customEq}
                  onChange={e=>setCustomEq(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();addCustom();}}}/>
                <button className="btn btn-ghost btn-sm" type="button" onClick={addCustom} disabled={!customEq.trim()}><Icon name="plus" size={14}/>เพิ่ม</button>
              </div>
              {/* แสดงรายการที่เลือกแล้ว */}
              {eq.length>0&&(
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {eq.map(id=>(
                    <span key={id} style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:12,padding:'3px 8px 3px 10px',borderRadius:20,background:'var(--primary-soft)',border:'1px solid var(--primary)',color:'var(--primary)'}}>
                      {EQ_PRESETS.find(p=>p.id===id)?<Icon name={EQ_PRESETS.find(p=>p.id===id).icon} size={12}/>:null}
                      {eqLabel(id)}
                      <button type="button" style={{display:'flex',padding:0,color:'var(--primary)',opacity:.7}} onClick={()=>removeEq(id)}><Icon name="x" size={12}/></button>
                    </span>
                  ))}
                </div>
              )}
            </div>
            {/* สีห้อง */}
            <div className="field">
              <label>สีห้อง</label>
              <div className="color-row">
                {ROOM_COLORS.map((c,i)=>(
                  <div key={i} className={'color-swatch'+(gIdx===i?' on':'')}
                    style={{background:`linear-gradient(135deg,${c[0]},${c[1]})`}}
                    onClick={()=>setGIdx(i)}/>
                ))}
              </div>
            </div>
            <button className="btn btn-primary btn-block" disabled={!name.trim()||saving} onClick={handleSave}>
              <Icon name={saving?'clock':'check'} size={16}/>
              {saving?'กำลังบันทึก...':(isEdit?'บันทึกการแก้ไข':'เพิ่มห้องประชุม')}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function RoomsAdmin({user,bookings,toast,reload}){
  const [editRoom,setEditRoom]=useState(null); // null=ปิด, {}=เพิ่มใหม่, {id,...}=แก้ไข
  const [delConfirm,setDelConfirm]=useState(null);
  const [saving,setSaving]=useState(false);

  if(!user.isAdmin) return(
    <div className="card pad" style={{textAlign:'center',padding:'48px 24px'}}>
      <Icon name="shield" size={48} sw={1.2}/>
      <div style={{fontSize:17,fontWeight:600,margin:'16px 0 8px'}}>ไม่มีสิทธิ์เข้าถึง</div>
      <div style={{color:'var(--text-muted)',fontSize:13}}>หน้านี้สำหรับ Admin / IT เท่านั้น</div>
    </div>
  );

  const handleSave=async(room)=>{
    setSaving(true);
    try{
      await apiSaveRoom(room);
      await reload();
      setEditRoom(null);
      toast(room.id?'แก้ไขห้องเรียบร้อย':'เพิ่มห้องใหม่เรียบร้อย','ok');
    }catch(e){ toast(e.message,'err'); }
    setSaving(false);
  };
  const handleDelete=async(roomId)=>{
    setSaving(true);
    try{
      await apiDeleteRoom(roomId);
      await reload();
      setDelConfirm(null);
      toast('ลบห้องเรียบร้อย','ok');
    }catch(e){ toast(e.message,'err'); }
    setSaving(false);
  };

  return(
    <div style={{maxWidth:680}}>
      <div className="row-between" style={{marginBottom:16}}>
        <div style={{fontSize:13,color:'var(--text-muted)'}}>{ROOMS.length} ห้องประชุม</div>
        <button className="btn btn-primary" onClick={()=>setEditRoom({})}><Icon name="plus" size={16}/>เพิ่มห้องใหม่</button>
      </div>

      <div className="manage-list">
        {ROOMS.map(r=>{
          const activeCount=bookings.filter(b=>b.room===r.id&&['confirmed','in-use','pending'].includes(b.status)).length;
          return(
            <div className="manage-row" key={r.id}>
              <div className="manage-color" style={{background:`linear-gradient(135deg,${r.g[0]},${r.g[1]})`}}/>
              <div className="manage-body">
                <div className="manage-name">{r.name}</div>
                <div className="manage-sub">
                  <span><Icon name="users" size={12}/> {r.cap} ที่นั่ง</span>
                  {r.eq.map(e=><span key={e} className="eq"><Icon name={e} size={11}/>{eqLabel(e)}</span>)}
                  {activeCount>0&&<span style={{color:'var(--amber-tx)',fontSize:11}}>📅 {activeCount} การจอง active</span>}
                </div>
              </div>
              <div style={{display:'flex',gap:7,flexShrink:0}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>setEditRoom({...r})}><Icon name="edit" size={14}/>แก้ไข</button>
                <button className="btn btn-sm" style={{background:'var(--red-bg)',color:'var(--red-tx)',border:'1px solid var(--red)'}}
                  onClick={()=>setDelConfirm(r)} disabled={saving}>
                  <Icon name="trash" size={14}/>ลบ
                </button>
              </div>
            </div>
          );
        })}
      </div>

      {/* Modal เพิ่ม/แก้ไข */}
      {editRoom!==null&&(
        <RoomFormModal room={editRoom} saving={saving} onSave={handleSave} onClose={()=>setEditRoom(null)}/>
      )}

      {/* Modal ยืนยันลบ */}
      {delConfirm&&(
        <div className="overlay" onClick={()=>setDelConfirm(null)}>
          <div className="modal" style={{maxWidth:380}} onClick={e=>e.stopPropagation()}>
            <div className="modal-head"><Icon name="warn" size={18} sw={2}/> ยืนยันลบห้อง</div>
            <div style={{padding:'14px 20px 20px'}}>
              <div style={{fontSize:13.5,marginBottom:16,lineHeight:1.6}}>
                ต้องการลบ <b>{delConfirm.name}</b> ออกจากระบบ?<br/>
                <span style={{color:'var(--text-muted)',fontSize:12}}>การจองเก่าที่ผ่านมาจะยังคงอยู่ในระบบ แต่จะไม่แสดงห้องในปฏิทินอีกต่อไป</span>
              </div>
              {bookings.filter(b=>b.room===delConfirm.id&&['confirmed','in-use','pending'].includes(b.status)).length>0&&(
                <div className="conflict-warn" style={{marginBottom:14}}><Icon name="warn" size={16}/><span>มีการจอง active อยู่ในห้องนี้ — Apps Script จะปฏิเสธการลบ</span></div>
              )}
              <div style={{display:'flex',gap:10}}>
                <button className="btn btn-ghost btn-block" onClick={()=>setDelConfirm(null)}>ยกเลิก</button>
                <button className="btn btn-danger btn-block" disabled={saving} onClick={()=>handleDelete(delConfirm.id)}>
                  <Icon name="trash" size={15}/>{saving?'กำลังลบ...':'ลบห้องนี้'}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ====== APP ====== */
function App(){
  const [ready,setReady]=useState(false);
  const [bootError,setBootError]=useState('');
  const [dark,setDark]=useState(false);
  const [page,setPage]=useState('home');
  const [user,setUser]=useState(()=>{try{const s=safeStore.get('mrb_user');return s?shapeUser(JSON.parse(s)):null;}catch(e){return null;}});
  // API AI — state aiConfig ถอดออกชั่วคราว (ดู AI_Module.js)
  const [bookings,setBookings]=useState([]);
  const [detail,setDetail]=useState(null);
  const [editing,setEditing]=useState(null);
  const [showProfile,setShowProfile]=useState(false);
  const [toastMsg,setToastMsg]=useState(null);
  const [search,setSearch]=useState('');
  const [now,setNow]=useState(Date.now());
  const [cursor,setCursor]=useState(TODAY);
  const [prefill,setPrefill]=useState({});
  const [refreshing,setRefreshing]=useState(false); // skeleton ตอน reload หลังบันทึก
  const [saving,setSaving]=useState(null);           // overlay ระหว่างบันทึก {text}
  const [successMsg,setSuccessMsg]=useState(null);   // ติ๊กถูกเขียวกลางจอ

  const toast=(msg,type='ok')=>setToastMsg({msg,type});

  // เติม countdown ปล่อยห้องอัตโนมัติให้ booking ที่กำลังใช้แต่ยังไม่เช็คอิน (เดโม 45 วิ)
  const prep=list=>list.map(b=>(b.status==='in-use'&&!b.checkedIn)?{...b,autoRelease:true,_releaseAt:Date.now()+45000}:b);

  const loadData=async()=>{
    setBootError('');
    try{
      const d=await apiGetAll();
      ROOMS=d.rooms||[];
      if(d.today)TODAY=d.today;
      setCursor(c=>c||TODAY);
      // API AI — โหลด aiKey จากชีตถอดออกชั่วคราว (ดู AI_Module.js)
      setBookings(prep(d.bookings||[]));
      setReady(true);
    }catch(e){ setBootError(e.message); }
  };
  useEffect(()=>{loadData();},[]);

  const reload=async()=>{
    try{const d=await apiGetAll();ROOMS=d.rooms||[];if(d.today)TODAY=d.today;setBookings(prep(d.bookings||[]));}
    catch(e){toast('โหลดข้อมูลใหม่ไม่สำเร็จ: '+e.message,'err');}
  };

  // นาฬิกา + ปล่อยห้องอัตโนมัติ
  useEffect(()=>{
    const iv=setInterval(()=>{const t=Date.now();setNow(t);
      setBookings(bs=>{let changed=false,nm='';const nb=bs.map(b=>{if(b.autoRelease&&b.status==='in-use'&&!b.checkedIn&&b._releaseAt&&t>=b._releaseAt){changed=true;nm=ROOM(b.room).name;return{...b,status:'released',autoRelease:false};}return b;});if(changed)setToastMsg({msg:'ปล่อยห้อง '+nm+' อัตโนมัติ (ไม่มีการเช็คอิน)',type:'warn'});return changed?nb:bs;});
    },1000);return()=>clearInterval(iv);
  },[]);
  useEffect(()=>{if(toastMsg){const t=setTimeout(()=>setToastMsg(null),3200);return()=>clearTimeout(t);}},[toastMsg]);
  useEffect(()=>{if(successMsg){const t=setTimeout(()=>setSuccessMsg(null),1500);return()=>clearTimeout(t);}},[successMsg]);

  // ── auth ──
  const onLogin=u=>{const su=shapeUser(u);setUser(su);safeStore.set('mrb_user',JSON.stringify(su));toast('ยินดีต้อนรับ '+su.nick,'ok');};
  const logout=()=>{safeStore.del('mrb_user');setUser(null);setPage('home');};

  // ── flow บันทึกกลาง: overlay (กำลังบันทึก) → skeleton (reload) → ติ๊กถูกเขียว ──
  const runSave=async({text,fn,ok,before,dest})=>{
    if(before)before();              // ปิด modal ที่เปิดอยู่ก่อน (ถ้ามี)
    setSaving({text});               // overlay "กำลังบันทึก..."
    try{
      await fn();                    // เขียน Sheet จริง (รอจริง)
      setSaving(null);               // ปิด overlay
      if(dest)go(dest);              // ไปหน้าปลายทางก่อน reload (ออกจากฟอร์ม)
      setRefreshing(true);           // โครง skeleton ระหว่างดึงข้อมูลใหม่
      await reload();
      setRefreshing(false);
      setSuccessMsg(ok);             // ติ๊กถูกเขียวกลางจอ
      return true;
    }catch(e){
      setSaving(null); setRefreshing(false);
      toast(e.message,'err');        // ล้มเหลว → toast แดง (ไม่ขึ้นติ๊กเขียว)
      return false;
    }
  };

  // ── booking actions ──
  const addBooking=(b,dest)=>runSave({
    text:'กำลังบันทึกการจอง...', dest:dest,
    ok:b.status==='draft'?'บันทึกร่างแล้ว':'จองห้องสำเร็จ',
    fn:()=>apiWrite({action:'saveBooking',booking:{room:b.room,date:b.date,start:b.s,end:b.e,title:b.title,att:b.att,owner:b.owner,by:b.by,link:b.link,extras:b.extras||[],status:b.status}})
  });
  const cancelBooking=id=>runSave({
    text:'กำลังยกเลิกการจอง...', before:()=>setDetail(null), ok:'ยกเลิกการจองแล้ว',
    fn:()=>apiWrite({action:'cancelBooking',bookingId:id})
  });
  const checkIn=id=>{
    setBookings(bs=>bs.map(b=>b.id===id?{...b,checkedIn:true,autoRelease:false}:b)); // optimistic หยุด countdown ระหว่างรอ
    return runSave({ text:'กำลังเช็คอิน...', before:()=>setDetail(null), ok:'เช็คอินสำเร็จ',
      fn:()=>apiWrite({action:'checkIn',bookingId:id}) });
  };
  const editBooking=(id,patch)=>runSave({
    text:'กำลังแก้ไขการจอง...', before:()=>setEditing(null), ok:'แก้ไขการจองแล้ว',
    fn:()=>apiWrite({action:'editBooking',bookingId:id,patch:patch})
  });
  const go=p=>{setPage(p);setSearch('');};
  const openForm=pf=>{setPrefill(pf||{});setPage('form');};

  // ── render gate ──
  if(bootError)return <BootScreen error={bootError} onRetry={loadData}/>;
  if(!ready)return <SkeletonScreen/>;
  if(!user)return <AuthScreen onLogin={onLogin}/>;

  const ti={ok:'checkcircle',warn:'warn',err:'x'}[toastMsg?.type||'ok'];

  return(
    <div className="app" data-theme={dark?'dark':'light'}>
      <Sidebar page={page} go={go} user={user} openProfile={()=>setShowProfile(true)}/>
      <div className="main">
        <Topbar page={page} dark={dark} setDark={setDark} search={search} setSearch={setSearch} user={user}/>
        <div className="scroll">
          {refreshing ? <SkeletonContent/> : <>
          {page==='home'&&<Dashboard bookings={bookings} go={go} openDetail={setDetail} search={search} checkIn={checkIn} now={now} user={user} openForm={openForm}/>}
          {page==='form'&&<BookingForm key={JSON.stringify(prefill)} bookings={bookings} addBooking={addBooking} toast={toast} user={user} go={go} prefill={prefill} clearPrefill={()=>setPrefill({})}/>}
          {/* API AI — หน้า ChatBot ถอดออกชั่วคราว (ดู AI_Module.js) */}
          {page==='calendar'&&<CalendarView bookings={bookings} openDetail={setDetail} openForm={openForm} cursor={cursor} setCursor={setCursor}/>}
          {page==='mine'&&<MyBookings bookings={bookings} openDetail={setDetail} checkIn={checkIn} user={user}/>}
          {page==='rooms'&&<RoomsPage bookings={bookings} go={go} openForm={openForm}/>}
          {page==='manage'&&<RoomsAdmin user={user} bookings={bookings} toast={toast} reload={reload}/>}
          {page==='reports'&&<ReportsPage/>}
          {page==='settings'&&<SettingsPage dark={dark} setDark={setDark} user={user} setUser={setUser} openProfile={()=>setShowProfile(true)} logout={logout}/>}
          </>}
        </div>
      </div>
      <MobileNav page={page} go={go}/>
      {detail&&<BookingDetail b={bookings.find(x=>x.id===detail.id)||detail} close={()=>setDetail(null)} cancel={cancelBooking} checkIn={checkIn} user={user} onEdit={b=>{setDetail(null);setEditing(b);}}/>}
      {editing&&<EditModal b={editing} bookings={bookings} close={()=>setEditing(null)} save={editBooking} toast={toast}/>}
      {showProfile&&<ProfileModal user={user} setUser={setUser} close={()=>setShowProfile(false)} toast={toast} logout={logout}/>}
      {saving&&<SavingOverlay text={saving.text}/>}
      {successMsg&&<SuccessCheck msg={successMsg}/>}
      {toastMsg&&<div className={"toast "+toastMsg.type}><span className="ti"><Icon name={ti} size={17}/></span>{toastMsg.msg}</div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
